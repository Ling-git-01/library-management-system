<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>读者登录 - 图书馆借阅系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 44px 40px;
      width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo .icon { font-size: 48px; margin-bottom: 8px; }
    .logo h1 { font-size: 22px; color: #1a1a2e; font-weight: 700; }
    .logo p { font-size: 13px; color: #888; margin-top: 4px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 8px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #533483; box-shadow: 0 0 0 3px rgba(83,52,131,0.1); }
    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #533483, #7b2cbf);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .link { text-align: center; margin-top: 18px; font-size: 13px; color: #888; }
    .link a { color: #533483; text-decoration: none; font-weight: 600; }
    .toast {
      position: fixed; top: 20px; right: 20px;
      padding: 12px 20px; border-radius: 8px;
      color: #fff; font-size: 14px; z-index: 9999;
      display: none;
    }
    .toast.success { background: #4caf50; }
    .toast.error { background: #e94560; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="icon">📚</div>
      <h1>图书馆借阅系统</h1>
      <p>读者登录</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="loginBtn">登 录</button>
    </form>

    <div class="link">还没有账号？<a href="register.html">立即注册</a></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = 'http://localhost:8080';

    // 如果已经登录，直接跳首页
    if (localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showToast('请填写用户名和密码', 'error');
        return;
      }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = '登录中...';

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
          // 登录成功：存储 Token 和用户信息
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showToast('登录成功！正在跳转...', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 800);
        } else {
          showToast(data.message || '用户名或密码错误', 'error');
        }
      } catch (err) {
        showToast('网络错误，请检查后端服务是否启动（端口3000）', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    });

    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast ' + type;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }
  </script>
</body>
</html>
