/* 读者注册页 */
/* ===端口修改124= */
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>读者注册 - 图书馆借阅系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 22px; color: #1a1a2e; font-weight: 700; }
    .logo p { font-size: 13px; color: #888; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #533483; }
    input.error { border-color: #e94560; }
    .error-msg { color: #e94560; font-size: 12px; margin-top: 4px; display: none; }
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #533483, #7b2cbf);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .link { text-align: center; margin-top: 16px; font-size: 13px; color: #888; }
    .link a { color: #533483; text-decoration: none; font-weight: 600; }
    .toast {
      position: fixed; top: 20px; right: 20px;
      padding: 12px 20px; border-radius: 8px;
      color: #fff; font-size: 14px; z-index: 9999;
      display: none; animation: slideIn 0.3s ease;
    }
    .toast.success { background: #4caf50; }
    .toast.error { background: #e94560; }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>📚 图书馆借阅系统</h1>
      <p>读者注册</p>
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label>用户名 <span style="color:#e94560">*</span></label>
        <input type="text" id="username" placeholder="3-20位字母或数字">
        <div class="error-msg" id="usernameErr">用户名需为3-20位字母、数字或下划线</div>
      </div>

      <div class="form-group">
        <label>您的姓名 <span style="color:#e94560">*</span></label>
        <input type="text" id="realname" placeholder="请输入姓名">
        <div class="error-msg" id="realnameErr">姓名不能为空</div>
      </div>

      <div class="form-group">
        <label>密码 <span style="color:#e94560">*</span></label>
        <input type="password" id="password" placeholder="至少6位密码">
        <div class="error-msg" id="passwordErr">密码至少6位</div>
      </div>

      <div class="form-group">
        <label>确认密码 <span style="color:#e94560">*</span></label>
        <input type="password" id="confirmPassword" placeholder="再次输入密码">
        <div class="error-msg" id="confirmErr">两次密码输入不一致</div>
      </div>

      <div class="form-group">
        <label>邮箱(选填)</label>
        <input type="email" id="email" placeholder="example@email.com">
        <div class="error-msg" id="emailErr">邮箱格式不正确</div>
      </div>

      <div class="form-group">
        <label>手机号</label>
        <input type="tel" id="phone" placeholder="11位手机号">
        <div class="error-msg" id="phoneErr">手机号格式不正确</div>
      </div>

      <button type="submit" class="btn" id="submitBtn">立即注册</button>
    </form>

    <div class="link">已有账号？<a href="login.html">立即登录</a></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // API基础地址（根据实际后端地址修改）
    const API_BASE = 'http://localhost:8080';

    // 实时校验：确认密码
    document.getElementById('confirmPassword').addEventListener('input', function() {
      const pwd = document.getElementById('password').value;
      if (this.value && this.value !== pwd) {
        showFieldError('confirmPassword', 'confirmErr');
      } else {
        hideFieldError('confirmPassword', 'confirmErr');
      }
    });

    // 表单提交
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      // 获取字段值
      const username = document.getElementById('username').value.trim();
      const realname = document.getElementById('realname').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();

      // 前端校验
      let valid = true;

      // 用户名：3-20位
      if (!/^\w{3,20}$/.test(username)) {
        showFieldError('username', 'usernameErr');
        valid = false;
      } else {
        hideFieldError('username', 'usernameErr');
      }

      // 真实姓名
      if (!realname) {
        showFieldError('realname', 'realnameErr');
        valid = false;
      } else {
        hideFieldError('realname', 'realnameErr');
      }

      // 密码至少6位
      if (password.length < 6) {
        showFieldError('password', 'passwordErr');
        valid = false;
      } else {
        hideFieldError('password', 'passwordErr');
      }

      // 确认密码
      if (password !== confirmPassword) {
        showFieldError('confirmPassword', 'confirmErr');
        valid = false;
      } else {
        hideFieldError('confirmPassword', 'confirmErr');
      }

      // 邮箱格式（选填但格式要对）
      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showFieldError('email', 'emailErr');
        valid = false;
      } else {
        hideFieldError('email', 'emailErr');
      }

      // 手机号格式
      if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
        showFieldError('phone', 'phoneErr');
        valid = false;
      } else {
        hideFieldError('phone', 'phoneErr');
      }

      if (!valid) return;

      // 提交注册请求
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '注册中...';

      try {
        const res = await fetch(`${API_BASE}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, real_name: realname, email, phone })
        });
        const data = await res.json();

        if (res.ok) {
          showToast('注册成功！正在跳转到登录页...', 'success');
          setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        } else {
          showToast(data.message || '注册失败，请重试', 'error');
        }
      } catch (err) {
        showToast('网络错误，请检查后端服务是否启动', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '立即注册';
      }
    });

    function showFieldError(inputId, errId) {
      document.getElementById(inputId).classList.add('error');
      const errEl = document.getElementById(errId);
      if (errEl) errEl.style.display = 'block';
    }

    function hideFieldError(inputId, errId) {
      document.getElementById(inputId).classList.remove('error');
      const errEl = document.getElementById(errId);
      if (errEl) errEl.style.display = 'none';
    }

    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast ' + type;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }
  </script>
</body>
</html>
