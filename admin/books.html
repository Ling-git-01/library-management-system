<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书管理 - 图书馆管理后台</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h1>📚 图书管理系统</h1>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="dashboard.html">📊 仪表盘</a>
                </li>
                <li class="nav-item active">
                    <a href="books.html">📖 图书管理</a>
                </li>
                <li class="nav-item">
                    <a href="readers.html">👥 读者管理</a>
                </li>
                <li class="nav-item">
                    <a href="borrows.html">🔄 借阅处理</a>
                </li>
                <li class="nav-item">
                    <a href="reservations.html">📅 预约管理</a>
                </li>
                <li class="nav-item">
                    <a href="fines.html">💰 罚金管理</a>
                </li>
            </ul>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="page-header">
                <h2>📖 图书管理</h2>
                <p>图书列表 — 新增 / 编辑 / 删除（软删除）</p>
            </div>

            <!-- 操作栏 -->
            <div class="toolbar">
                <button class="btn btn-primary" onclick="openBookModal()">+ 新增图书</button>
                <div class="search-box">
                    <input type="text" id="bookSearch" placeholder="搜索书名、作者、ISBN..." oninput="filterBooks()">
                </div>
            </div>

            <!-- 软删除提示 -->
            <div class="alert alert-warning">
                <span class="alert-icon">⚠️</span>
                <div class="alert-content">
                    <div class="alert-title">软删除 vs 硬删除</div>
                    <div>删除图书是<strong>软删除</strong>（设置 <code>status=0</code>），这样历史借阅记录里还能关联到图书信息。对比：硬删除直接从数据库抹掉数据，可能导致借阅历史中出现"未知图书"。</div>
                </div>
            </div>

            <!-- 图书表格 -->
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>书名</th>
                        <th>作者</th>
                        <th>ISBN</th>
                        <th>分类</th>
                        <th>库存</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="booksTableBody">
                </tbody>
            </table>

            <!-- 分页 -->
            <div class="pagination-wrapper" id="pagination"></div>
        </main>
    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">弹窗标题</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        // ============ 图书管理 CRUD ============
        let currentPage = 1;
        const pageSize = 10;
        let currentKeyword = '';

        async function loadBooks(page = 1, keyword = '') {
            currentPage = page;
            currentKeyword = keyword;
            try {
                let url = `/api/books?page=${page}&pageSize=${pageSize}`;
                if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
                const res = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const result = await res.json();
                renderBooks(result.data.list);
                renderPagination(result.data);
            } catch (err) {
                console.error('获取图书列表失败:', err);
            }
        }

        function renderPagination(pageData) {
            const container = document.getElementById('pagination');
            if (!container) return;
            const { total, page, totalPages } = pageData;
            let html = `<div class="pagination-info">共 ${total} 条，第 ${page}/${totalPages} 页</div>`;
            html += `<div class="pagination-btns">`;
            html += `<button class="btn btn-sm" ${page <= 1 ? 'disabled' : ''} onclick="changePage(${page - 1})">上一页</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === page) {
                    html += `<button class="btn btn-sm btn-primary">${i}</button>`;
                } else {
                    html += `<button class="btn btn-sm" onclick="changePage(${i})">${i}</button>`;
                }
            }
            html += `<button class="btn btn-sm" ${page >= totalPages ? 'disabled' : ''} onclick="changePage(${page + 1})">下一页</button>`;
            html += `</div>`;
            container.innerHTML = html;
        }

        function changePage(page) {
            loadBooks(page, currentKeyword);
        }

        function renderBooks(books) {
            const tbody = document.getElementById('booksTableBody');
            tbody.innerHTML = books.map(b => `
                <tr>
                    <td>${b.id}</td>
                    <td>${b.title}</td>
                    <td>${b.author}</td>
                    <td>${b.isbn}</td>
                    <td><span class="tag">${b.category}</span></td>
                    <td>${b.stock}</td>
                    <td><span class="status-badge ${b.status === 1 ? 'status-active' : 'status-inactive'}">${b.status === 1 ? '在架' : '已删除'}</span></td>
                    <td>
                        <button class="btn btn-primary btn-sm" onclick="editBook(${b.id})">编辑</button>
                        ${b.status === 1
                            ? `<button class="btn btn-danger btn-sm" onclick="deleteBook(${b.id})">删除</button>`
                            : `<button class="btn btn-danger btn-sm" disabled>已删除</button>`}
                    </td>
                </tr>
            `).join('');
        }

        // --- 新增 ---
        function openBookModal(book = null) {
            const isEdit = !!book;
            document.getElementById('modalTitle').textContent = isEdit ? '编辑图书' : '新增图书';
            document.getElementById('modalBody').innerHTML = `
                <form id="bookForm">
                    <div class="form-group">
                        <label>书名</label>
                        <input type="text" name="title" value="${book ? book.title : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>作者</label>
                        <input type="text" name="author" value="${book ? book.author : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>ISBN</label>
                        <input type="text" name="isbn" value="${book ? book.isbn : ''}" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>分类</label>
                            <select name="category">
                                <option>计算机</option><option>文学</option><option>历史</option>
                                <option>科学</option><option>艺术</option><option>其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>库存</label>
                            <input type="number" name="stock" value="${book ? book.stock : 1}" min="0" required>
                        </div>
                    </div>
                    <input type="hidden" name="id" value="${book ? book.id : ''}">
                </form>
            `;
            document.getElementById('modalFooter').innerHTML = `
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveBook(${isEdit})">${isEdit ? '保存修改' : '确认新增'}</button>
            `;
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        function editBook(id) {
            fetch(`/api/books/${id}`, {
                headers: { 'Authorization': 'Bearer ' + getToken() }
            })
                .then(r => r.json())
                .then(book => openBookModal(book))
                .catch(() => {
                    alert('获取图书详情失败');
                });
        }
        async function saveBook(isEdit) {
            const form = document.getElementById('bookForm');
            const formData = new FormData(form);
            const body = Object.fromEntries(formData);
            const url = isEdit ? `/api/books/${body.id}` : '/api/books';
            const method = isEdit ? 'PUT' : 'POST';
            try {
                const res = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify(body)
                });
                if (res.ok) {
                    closeModal();
                    loadBooks(currentPage, currentKeyword);
                }
            } catch (err) {
                alert('保存失败: ' + err.message);
            }
        }

        // --- 删除（软删除） ---
        function deleteBook(id) {
            if (!confirm('确定删除该书吗？（软删除，status设为0，历史借阅记录仍可关联）')) return;
            fetch(`/api/books/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + getToken() }
            })
                .then(() => loadBooks(currentPage, currentKeyword))
                .catch(err => alert('删除失败: ' + err.message));
        }

        function filterBooks() {
            const keyword = document.getElementById('bookSearch').value;
            loadBooks(1, keyword);
        }

        loadBooks();
    </script>
</body>
</html>
