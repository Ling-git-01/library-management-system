<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>借阅处理 - 图书馆管理后台</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h1>📚 图书管理系统</h1>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="dashboard.html">📊 仪表盘</a>
                </li>
                <li class="nav-item">
                    <a href="books.html">📖 图书管理</a>
                </li>
                <li class="nav-item">
                    <a href="readers.html">👥 读者管理</a>
                </li>
                <li class="nav-item active">
                    <a href="borrows.html">🔄 借阅处理</a>
                </li>
                <li class="nav-item">
                    <a href="reservations.html">📅 预约管理</a>
                </li>
                <li class="nav-item">
                    <a href="fines.html">💰 罚金管理</a>
                </li>
            </ul>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="page-header">
                <h2>🔄 借阅处理</h2>
                <p>查看所有借阅记录，管理员可手动帮读者还书</p>
            </div>

            <!-- 统计概要 -->
            <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
                <div class="stat-card warning">
                    <div class="stat-label">借阅中</div>
                    <div class="stat-value">342</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-label">已归还</div>
                    <div class="stat-value">1,890</div>
                </div>
                <div class="stat-card danger">
                    <div class="stat-label">已逾期</div>
                    <div class="stat-value">18</div>
                </div>
            </div>

            <!-- 操作栏 -->
            <div class="toolbar">
                <div class="tabs">
                    <button class="tab active" onclick="filterBorrows('all')">全部</button>
                    <button class="tab" onclick="filterBorrows('borrowing')">借阅中</button>
                    <button class="tab" onclick="filterBorrows('overdue')">已逾期</button>
                    <button class="tab" onclick="filterBorrows('returned')">已归还</button>
                </div>
                <div class="search-box">
                    <input type="text" id="borrowSearch" placeholder="搜索读者/书名...">
                </div>
            </div>

            <!-- 借阅表格 -->
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>读者</th>
                        <th>书名</th>
                        <th>借阅日期</th>
                        <th>应还日期</th>
                        <th>实际归还</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="borrowsTableBody">
                </tbody>
            </table>

            <!-- 分页 -->
            <div class="pagination-wrapper" id="pagination"></div>
        </main>
    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">弹窗标题</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        // ============ 借阅处理 ============
        let currentPage = 1;
        const pageSize = 10;
        let currentStatus = 'all';

        async function loadBorrows(page = 1, status = 'all') {
            currentPage = page;
            currentStatus = status;
            try {
                let url = `/api/admin/borrows?page=${page}&pageSize=${pageSize}`;
                if (status && status !== 'all') url += `&status=${status}`;
                const res = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const result = await res.json();
                renderBorrows(result.data.list);
                renderPagination(result.data);
            } catch (err) {
                console.error('获取借阅记录失败:', err);
            }
        }

        function renderPagination(pageData) {
            const container = document.getElementById('pagination');
            if (!container) return;
            const { total, page, totalPages } = pageData;
            let html = `<div class="pagination-info">共 ${total} 条，第 ${page}/${totalPages} 页</div>`;
            html += `<div class="pagination-btns">`;
            html += `<button class="btn btn-sm" ${page <= 1 ? 'disabled' : ''} onclick="changePage(${page - 1})">上一页</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === page) {
                    html += `<button class="btn btn-sm btn-primary">${i}</button>`;
                } else {
                    html += `<button class="btn btn-sm" onclick="changePage(${i})">${i}</button>`;
                }
            }
            html += `<button class="btn btn-sm" ${page >= totalPages ? 'disabled' : ''} onclick="changePage(${page + 1})">下一页</button>`;
            html += `</div>`;
            container.innerHTML = html;
        }

        function changePage(page) {
            loadBorrows(page, currentStatus);
        }

        function renderBorrows(borrows) {
            const tbody = document.getElementById('borrowsTableBody');
            tbody.innerHTML = borrows.map(b => {
                let statusClass, statusText;
                if (b.returned_at) {
                    statusClass = 'status-active';
                    statusText = '已归还';
                } else if (new Date(b.due_date) < new Date()) {
                    statusClass = '';
                    statusText = '已逾期';
                } else {
                    statusClass = '';
                    statusText = '借阅中';
                }
                return `
                    <tr data-status="${b.returned_at ? 'returned' : (new Date(b.due_date) < new Date() ? 'overdue' : 'borrowing')}">
                        <td>${b.id}</td>
                        <td>${b.reader_name}</td>
                        <td>${b.book_title}</td>
                        <td>${b.borrow_date}</td>
                        <td>${b.due_date}</td>
                        <td>${b.returned_at || '—'}</td>
                        <td><span class="status-badge" style="${statusClass ? '' : (statusText === '已逾期' ? 'background:#f8d7da;color:#721c24;' : 'background:#fff3cd;color:#856404;')}">${statusText}</span></td>
                        <td>
                            ${!b.returned_at
                                ? `<button class="btn btn-success btn-sm" onclick="returnBook(${b.id})">手动还书</button>`
                                : '<span style="color:#7f8c8d;">—</span>'}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // --- 手动还书 ---
        async function returnBook(id) {
            if (!confirm('确定帮读者归还该书吗？（由管理员手动操作）')) return;
            try {
                const res = await fetch(`/api/admin/borrows/${id}/return`, {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                if (res.ok) {
                    loadBorrows(currentPage, currentStatus);
                } else {
                    alert('还书操作失败');
                }
            } catch (err) {
                alert('还书操作失败: ' + err.message);
            }
        }

        // --- 标签页筛选 ---
        function filterBorrows(status) {
            if (typeof status === 'string') {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                if (status !== 'all') {
                    document.querySelectorAll('.tab').forEach(t => {
                        if (t.textContent.includes(
                            status === 'borrowing' ? '借阅中' :
                            status === 'overdue' ? '已逾期' : '已归还'
                        )) t.classList.add('active');
                    });
                } else {
                    document.querySelector('.tab').classList.add('active');
                }
                loadBorrows(1, status);
                return;
            }
            // 搜索输入（无参数）- 客户端过滤当前页
            const keyword = document.getElementById('borrowSearch').value.toLowerCase();
            document.querySelectorAll('#borrowsTableBody tr').forEach(row => {
                row.style.display = !keyword || row.textContent.toLowerCase().includes(keyword) ? '' : 'none';
            });
        }

        document.getElementById('borrowSearch').addEventListener('input', () => filterBorrows());

        loadBorrows();
    </script>
</body>
</html>
