<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>读者管理 - 图书馆管理后台</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h1>📚 图书管理系统</h1>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="dashboard.html">📊 仪表盘</a>
                </li>
                <li class="nav-item">
                    <a href="books.html">📖 图书管理</a>
                </li>
                <li class="nav-item active">
                    <a href="readers.html">👥 读者管理</a>
                </li>
                <li class="nav-item">
                    <a href="borrows.html">🔄 借阅处理</a>
                </li>
                <li class="nav-item">
                    <a href="reservations.html">📅 预约管理</a>
                </li>
                <li class="nav-item">
                    <a href="fines.html">💰 罚金管理</a>
                </li>
            </ul>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="page-header">
                <h2>👥 读者管理</h2>
            </div>

            <!-- 操作栏 -->
            <div class="toolbar">
                <div class="search-box">
                    <input type="text" id="readerSearch" placeholder="搜索用户名、邮箱..." oninput="filterReaders()">
                </div>
            </div>

            <!-- 读者表格 -->
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>邮箱</th>
                        <th>最大借阅数</th>
                        <th>当前借阅</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="readersTableBody">
                </tbody>
            </table>

            <!-- 分页 -->
            <div class="pagination-wrapper" id="pagination"></div>
        </main>
    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">弹窗标题</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        // ============ 读者管理 ============
        // 后端 GET /admin/user/list 已附带 role 和 currentBorrowCount 字段
        // 列表里隐藏 role==='admin' 的管理员账号
        let allReadersCache = [];
        let currentPage = 1;
        const pageSize = 10;
        let currentKeyword = '';

        async function loadReaders(page = 1, keyword = '') {
            currentPage = page;
            currentKeyword = keyword;
            try {
                const res = await fetch('/api/admin/user/list', {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const result = await res.json();
                allReadersCache = Array.isArray(result.data) ? result.data : [];
                applyAndRender();
            } catch (err) {
                console.error('获取读者列表失败:', err);
            }
        }

        // 过滤：搜索 + 排除管理员
        function getFilteredReaders() {
            return allReadersCache.filter(r => {
                if (r.role === 'admin') return false; // 隐藏管理员账号
                if (!currentKeyword) return true;
                const kw = currentKeyword.toLowerCase();
                const text = `${r.id} ${r.username || ''} ${r.email || ''} ${r.phone || ''} ${r.realName || ''}`.toLowerCase();
                return text.includes(kw);
            });
        }

        function renderPagination(pageData) {
            const container = document.getElementById('pagination');
            if (!container) return;
            const { total, page, totalPages } = pageData;
            if (totalPages <= 1) { container.innerHTML = `<div class="pagination-info">共 ${total} 条</div>`; return; }
            let html = `<div class="pagination-info">共 ${total} 条，第 ${page}/${totalPages} 页</div>`;
            html += `<div class="pagination-btns">`;
            html += `<button class="btn btn-sm" ${page <= 1 ? 'disabled' : ''} onclick="changePage(${page - 1})">上一页</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === page) {
                    html += `<button class="btn btn-sm btn-primary">${i}</button>`;
                } else {
                    html += `<button class="btn btn-sm" onclick="changePage(${i})">${i}</button>`;
                }
            }
            html += `<button class="btn btn-sm" ${page >= totalPages ? 'disabled' : ''} onclick="changePage(${page + 1})">下一页</button>`;
            html += `</div>`;
            container.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            applyAndRender();
        }

        function applyAndRender() {
            const list = getFilteredReaders();
            const total = list.length;
            const totalPages = Math.max(1, Math.ceil(total / pageSize));
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * pageSize;
            const pageList = list.slice(start, start + pageSize);
            renderReaders(pageList);
            renderPagination({ total, page: currentPage, totalPages });
        }

        function renderReaders(readers) {
            const tbody = document.getElementById('readersTableBody');
            if (!readers.length) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#7f8c8d;">暂无数据</td></tr>`;
                return;
            }
            tbody.innerHTML = readers.map(r => {
                const isActive = r.status === 1;
                const maxBorrow = r.maxBorrowCount == null ? 5 : r.maxBorrowCount;
                const currentBorrow = r.currentBorrowCount == null ? 0 : r.currentBorrowCount;
                return `
                <tr>
                    <td>${r.id}</td>
                    <td>${r.username || ''}</td>
                    <td>${r.email || ''}</td>
                    <td>
                        <span class="editable-number" onclick="editMaxBorrow(${r.id}, ${maxBorrow})">${maxBorrow}</span>
                    </td>
                    <td>${currentBorrow} / ${maxBorrow}</td>
                    <td><span class="status-badge ${isActive ? 'status-active' : 'status-inactive'}">${isActive ? '启用' : '禁用'}</span></td>
                    <td>
                        ${isActive
                            ? `<button class="btn btn-warning btn-sm" onclick="toggleReader(${r.id}, false)">禁用</button>`
                            : `<button class="btn btn-success btn-sm" onclick="toggleReader(${r.id}, true)">启用</button>`}
                        <button class="btn btn-primary btn-sm" onclick="editMaxBorrow(${r.id}, ${maxBorrow})">修改借阅上限</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteReader(${r.id})">删除</button>
                    </td>
                </tr>
            `;
            }).join('');
        }

        // --- 禁用/启用（走 update 接口，传入 status）---
        async function toggleReader(id, enable) {
            const action = enable ? '启用' : '禁用';
            if (!confirm(`确定要${action}该读者吗？`)) return;
            try {
                const res = await fetch(`/api/admin/user/update/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify({ status: enable ? 1 : 0 })
                });
                const result = await res.json();
                if (res.ok && result.success) {
                    loadReaders(currentPage, currentKeyword);
                } else {
                    alert('操作失败: ' + (result.msg || res.status));
                }
            } catch (err) {
                alert('操作失败: ' + err.message);
            }
        }

        // --- 删除（逻辑删除）---
        async function deleteReader(id) {
            if (!confirm('确定要删除该读者吗？（逻辑删除）')) return;
            try {
                const res = await fetch(`/api/admin/user/delete/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const result = await res.json();
                if (res.ok && result.success) {
                    loadReaders(currentPage, currentKeyword);
                } else {
                    alert('删除失败: ' + (result.msg || res.status));
                }
            } catch (err) {
                alert('删除失败: ' + err.message);
            }
        }

        // --- 修改最大借阅数 ---
        function editMaxBorrow(id, current) {
            document.getElementById('modalTitle').textContent = '修改最大借阅数';
            document.getElementById('modalBody').innerHTML = `
                <div class="form-group">
                    <label>当前最大借阅数</label>
                    <p style="font-size:24px;font-weight:600;">${current}</p>
                </div>
                <div class="form-group">
                    <label>新的最大借阅数 (maxBorrowCount)</label>
                    <input type="number" id="newMaxBorrow" value="${current}" min="1" max="20" required>
                </div>
            `;
            document.getElementById('modalFooter').innerHTML = `
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveMaxBorrow(${id})">确认修改</button>
            `;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        async function saveMaxBorrow(id) {
            const newCount = parseInt(document.getElementById('newMaxBorrow').value);
            if (!newCount || newCount < 1) { alert('请输入合法的借阅数'); return; }
            try {
                const res = await fetch(`/api/admin/user/maxBorrow/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify({ maxBorrowCount: newCount })
                });
                const result = await res.json();
                if (res.ok && result.success) {
                    alert('修改最大借阅数成功');
                    closeModal();
                    loadReaders(currentPage, currentKeyword);
                } else {
                    alert('修改失败: ' + (result.msg || res.status));
                }
            } catch (err) {
                alert('修改失败: ' + err.message);
            }
        }

        function filterReaders() {
            currentKeyword = document.getElementById('readerSearch').value;
            currentPage = 1;
            applyAndRender();
        }

        loadReaders();
    </script>
</body>
</html>
